name: LLM Live Smoke Tests

on:
  workflow_dispatch:
    inputs:
      providers:
        description: Comma-separated providers to test (for example: openai,groq)
        required: false
        default: ""
      python-version:
        description: Python version
        required: false
        default: "3.13"

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live smoke tests
        env:
          RUN_LLM_SMOKE_TESTS: "1"
          LLM_SMOKE_PROVIDERS: ${{ inputs.providers }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python -m unittest tests.test_llm_live_smoke